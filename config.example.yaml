# Copy this to config.yaml and edit values.
# Keep passwords/tokens in environment variables when possible.

# DHCP
dhcp_root: /etc/dhcp
dhcp_static_filename: Mikrotik-Static
dhcp_leases_files:
  - /var/lib/dhcp/dhcpd.leases
  - /var/log/syslog
# Validate before sync. Change this if your dhcpd.conf path is different.
dhcp_validate_command: ["dhcpd", "-t", "-cf", "/etc/dhcp/dhcpd.conf"]
# Runs with cwd=/etc/dhcp by default.
dhcp_sync_command: ["./dhcp-sync.sh", "apply"]

# NetBox. Prefer env: NETBOX_URL and NETBOX_TOKEN.
netbox_url: "http://netbox.cablenet-as.net:8000"
# Your curl example uses Authorization: Bearer <token>.
# If your NetBox expects Token instead, set this to "Token".
netbox_auth_scheme: "Bearer"
netbox_token: "GF2KfPeCu8Pf4Tk80Qds6nl8SKblLtq7rHCx5Bx2"

# MikroTik. Prefer env: MTIK_PASSWORD.
mtik_username: admin
mtik_password: "VAbitv24cnt!"
mtik_port: 22
mtik_timeout: 20

# RouterOS names
pppoe_interface: pppoe-out-Internet
internet_interface: bridge-internet
# Which DHCP clients to release/renew. Default affects all enabled DHCP clients.
dhcp_client_find: "[find disabled=no]"

# Verification timings
ping_count: 3
ping_timeout_seconds: 2
post_renew_wait_seconds: 10
reboot_wait_seconds: 90

# Logs
log_dir: ./logs

# Optional: run DHCP file lookup/edit/validate/sync through SSH instead of locally.
# Prefer environment variables rather than storing the password here:
#   DHCP_REMOTE_ENABLED=true
#   DHCP_SSH_HOST=172.23.16.30
#   DHCP_SSH_USERNAME=root
#   DHCP_SSH_PASSWORD=...
dhcp_remote_enabled: true
dhcp_ssh_host: "172.23.16.30"
dhcp_ssh_username: root
dhcp_ssh_password: "Purp13W0r1d!"
dhcp_ssh_port: 22
dhcp_ssh_timeout: 20
